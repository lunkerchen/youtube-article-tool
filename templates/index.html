<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 轉文章工具 v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 高級排版系統 */
        .prose { 
            color: #94a3b8; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            letter-spacing: 0.01em;
        }
        .prose h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
            background: linear-gradient(to right, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        .prose h2 { 
            font-size: 1.75rem; 
            font-weight: 700; 
            margin-top: 3rem; 
            margin-bottom: 1.25rem; 
            color: #60a5fa; 
            border-left: 5px solid #3b82f6;
            padding-left: 1rem;
            line-height: 1.3;
        }
        .prose h3 { 
            font-size: 1.4rem; 
            font-weight: 600; 
            margin-top: 2rem; 
            margin-bottom: 1rem; 
            color: #cbd5e1; 
        }
        .prose p { margin-bottom: 1.5rem; }
        .prose ul { list-style-type: none; margin-left: 0; margin-bottom: 1.5rem; }
        .prose li { 
            margin-bottom: 0.75rem; 
            position: relative; 
            padding-left: 1.5rem; 
        }
        .prose li::before { 
            content: "•"; 
            color: #3b82f6; 
            font-weight: bold; 
            position: absolute; 
            left: 0; 
        }
        .prose strong { color: #f8fafc; font-weight: 600; }
        .prose blockquote { 
            border-left: 4px solid #3b82f6; 
            padding: 1rem 1.5rem; 
            font-style: italic; 
            color: #94a3b8; 
            margin: 2rem 0; 
            background: rgba(59, 130, 246, 0.1);
            border-radius: 0 0.75rem 0.75rem 0;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans selection:bg-blue-500/30">
    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-extrabold text-white mb-4 tracking-tight">YouTube <span class="text-blue-500">轉文章</span></h1>
            <p class="text-slate-400 text-lg mb-8">高效並行轉換 -> 結構化深度知識庫</p>
        </header>

        <div class="bg-[#1e293b] p-6 rounded-2xl shadow-2xl mb-8 border border-slate-700">
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-medium text-slate-400 ml-1">Gemini API Key</label>
                    <input id="apiKeyInput" type="password" placeholder="輸入你的 Gemini API Key..." 
                           class="w-full bg-[#0f172a] border border-slate-600 rounded-xl px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <textarea id="urlInput" placeholder="貼上 YouTube 連結 (每行一個，支持多影片並行轉換...)" 
                          class="w-full h-32 bg-[#0f172a] border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none"></textarea>
                <button id="convertBtn" onclick="convert()" 
                        class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all active:scale-95 disabled:opacity-50 shadow-lg shadow-blue-900/20">
                    立即啟動並行轉換
                </button>
            </div>
        </div>

        <!-- 錯誤訊息顯示區域 -->
        <div id="errorDisplay" class="hidden mb-8 p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm space-y-2">
            <div class="flex items-center gap-2 font-bold mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12" y2="16"></line></svg>
                <span>發生錯誤或部分轉換失敗</span>
            </div>
            <div id="errorMessages" class="space-y-1 opacity-90"></div>
        </div>

        <div id="loading" class="hidden space-y-4 mb-12">
            <div class="flex justify-between items-center mb-2">
                <p id="loadingText" class="text-slate-400 text-lg font-medium">正在初始化並行隊列...</p>
                <span id="progressPercent" class="text-blue-500 font-bold">0%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultContainer" class="hidden space-y-6 mb-12">
            <div class="flex justify-between items-center bg-[#1e293b] p-4 rounded-xl border border-slate-700">
                <span class="text-slate-400 text-sm font-medium">文章已生成</span>
                <div class="flex gap-2">
                    <button onclick="downloadMarkdown()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-xs transition-all flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        下載 MD 檔
                    </button>
                    <button onclick="copyMarkdown()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-xs transition-all flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        複製 Markdown
                    </button>
                </div>
            </div>
            <div id="result" class="bg-[#1e293b] p-8 rounded-2xl shadow-xl border border-slate-700 prose max-w-none">
                <!-- 文章內容將在此渲染 -->
            </div>
        </div>

        <div id="historySection" class="mt-20">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                <span>📜 最近轉換紀錄</span>
            </h2>
            <div id="historyList" class="grid gap-4">
                <!-- 歷史紀錄將在此渲染 -->
            </div>
        </div>
    </div>

    <script>
        let currentArticle = "";
        let currentTitle = "";

        function showError(messages) {
            const display = document.getElementById('errorDisplay');
            const container = document.getElementById('errorMessages');
            if (!messages || messages.length === 0) {
                display.classList.add('hidden');
                return;
            }
            container.innerHTML = messages.map(m => `<div>• ${m}</div>`).join('');
            display.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorDisplay').classList.add('hidden');
        }

        async function loadHistory() {
            try {
                const res = await fetch('/history');
                const data = await res.json();
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                if (!data || !Array.isArray(data) || data.length === 0) {
                    list.innerHTML = '<p class="text-slate-500 text-center py-8 bg-[#1e293b] rounded-xl border border-slate-700">尚無紀錄</p>';
                    return;
                }
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bg-[#1e293b] p-3 rounded-xl border border-slate-700 flex gap-4 items-center hover:border-blue-500 transition-all cursor-pointer group overflow-hidden';
                    div.onclick = () => showArticle(item.article, item.title);
                    div.innerHTML = `
                        <div class="w-24 h-14 flex-shrink-0 overflow-hidden rounded-lg bg-slate-800 relative">
                            <img src="${item.thumbnail || 'https://via.placeholder.com/96x56?text=No+Image'}" 
                                 referrerpolicy="no-referrer"
                                 class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" 
                                 onerror="this.src='https://via.placeholder.com/96x56?text=No+Image'">
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-medium mb-1 truncate group-hover:text-blue-400 transition-all overflow-hidden whitespace-nowrap text-ellipsis">${item.title}</div>
                            <div class="text-xs text-slate-500 truncate overflow-hidden whitespace-nowrap text-ellipsis">${item.date} · ${item.url}</div>
                        </div>
                        <div class="flex-shrink-0 ml-2">
                            <button onclick="event.stopPropagation(); deleteItem('${item.url}')" class="p-2 hover:bg-red-500/20 rounded-lg text-slate-500 hover:text-red-400 transition-all" title="刪除">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                console.error('Load history failed:', e);
            }
        }

        function showArticle(article, title) {
            currentArticle = article;
            currentTitle = title;
            document.getElementById('result').innerHTML = marked.parse(article);
            document.getElementById('resultContainer').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteItem(url) {
            if(!confirm('確定要刪除這條紀錄嗎？')) return;
            try {
                await fetch(`/history?url=${encodeURIComponent(url)}`, { method: 'DELETE' });
                await loadHistory();
            } catch (e) {
                showError(['刪除失敗']);
            }
        }

        async function copyMarkdown() {
            if(!currentArticle) return;
            await navigator.clipboard.writeText(currentArticle);
            showError(['Markdown 已複製到剪貼簿！']);
            setTimeout(hideError, 3000);
        }

        function downloadMarkdown() {
            if(!currentArticle || !currentTitle) return;
            const blob = new Blob([currentArticle], { type: 'text/markdown; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const safeName = currentTitle.replace(/[/\\?%*:|"<>]/g, '-').trim();
            a.href = url;
            a.download = safeName + '.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function convert() {
            const urlInput = document.getElementById('urlInput');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const urls = urlInput.value.split('\\n').filter(u => u.trim());
            const apiKey = apiKeyInput.value.trim();
            hideError();
            if (!apiKey) {
                showError(['請先輸入 Gemini API Key']);
                return;
            }
            localStorage.setItem('gemini_api_key', apiKey);
            if (urls.length === 0) {
                showError(['請輸入至少一個 YouTube 連結']);
                return;
            }
            const btn = document.getElementById('convertBtn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const loadingText = document.getElementById('loadingText');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            btn.disabled = true;
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            let progress = 0;
            const steps = ["🔍 初始化並行隊列...", "📥 批量提取字幕...", "🧹 並行清洗數據...", "🤖 AI 深度重構文章..."];
            let stepIdx = 0;
            const progressInterval = setInterval(() => {
                if (progress < 30) progress += Math.random() * 5;
                else if (progress < 70) progress += Math.random() * 2;
                else if (progress < 95) progress += Math.random() * 0.5;
                if (progress > 100) progress = 100;
                progressBar.style.width = `${progress}%`;
                progressPercent.innerText = `${Math.round(progress)}%`;
                if (progress > 25 && stepIdx === 0) stepIdx = 1;
                if (progress > 50 && stepIdx === 1) stepIdx = 2;
                if (progress > 80 && stepIdx === 2) stepIdx = 3;
                loadingText.innerText = steps[stepIdx];
            }, 200);
            try {
                const formData = new FormData();
                formData.append('urls', urlInput.value);
                formData.append('api_key', apiKey);
                const response = await fetch('/convert', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.error) {
                    showError([data.error]);
                } else {
                    progress = 100;
                    progressBar.style.width = '100%';
                    progressPercent.innerText = '100%';
                    setTimeout(async () => {
                        const results = data.results;
                        const successful = results.filter(r => !r.error);
                        const failed = results.filter(r => r.error);
                        if (successful.length === 0) {
                            const errorMsgs = failed.map(f => `${f.url} : ${f.error}`);
                            showError(errorMsgs);
                        } else {
                            const firstResult = successful[0];
                            currentArticle = firstResult.article;
                            const titleMatch = currentArticle.match(/^#\s+(.*)$/m);
                            currentTitle = titleMatch ? titleMatch[1] : "YouTube 轉文章";
                            showArticle(currentArticle, currentTitle);
                            if (failed.length > 0) {
                                const errorMsgs = failed.map(f => `${f.url} : ${f.error}`);
                                showError(errorMsgs);
                            }
                        }
                        await loadHistory();
                    }, 500);
                }
            } catch (e) {
                showError(['請求失敗: ' + e]);
            } finally {
                clearInterval(progressInterval);
                setTimeout(() => {
                    loading.classList.add('hidden');
                    progressBar.style.width = '0%';
                    progressPercent.innerText = '0%';
                }, 800);
                btn.disabled = false;
            }
        }

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
            loadHistory();
        };
    </script>
</body>
</html>
