<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 轉文章工具 v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 高級排版系統 */
        .prose { 
            color: #94a3b8; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            letter-spacing: 0.01em;
        }
        .prose h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
            background: linear-gradient(to right, #60a5fa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        .prose h2 { 
            font-size: 1.75rem; 
            font-weight: 700; 
            margin-top: 3rem; 
            margin-bottom: 1.25rem; 
            color: #60a5fa; 
            border-left: 5px solid #3b82f6;
            padding-left: 1rem;
            line-height: 1.3;
        }
        .prose h3 { 
            font-size: 1.4rem; 
            font-weight: 600; 
            margin-top: 2rem; 
            margin-bottom: 1rem; 
            color: #cbd5e1; 
        }
        .prose p { margin-bottom: 1.5rem; }
        .prose ul { list-style-type: none; margin-left: 0; margin-bottom: 1.5rem; }
        .prose li { 
            margin-bottom: 0.75rem; 
            position: relative; 
            padding-left: 1.5rem; 
        }
        .prose li::before { 
            content: "•"; 
            color: #3b82f6; 
            font-weight: bold; 
            position: absolute; 
            left: 0; 
        }
        .prose strong { color: #f8fafc; font-weight: 600; }
        .prose blockquote { 
            border-left: 4px solid #3b82f6; 
            padding: 1rem 1.5rem; 
            font-style: italic; 
            color: #94a3b8; 
            margin: 2rem 0; 
            background: rgba(59, 130, 246, 0.1);
            border-radius: 0 0.75rem 0.75rem 0;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans selection:bg-blue-500/30">
    <div class="max-w-4xl mx-auto px-4 py-12 relative">
        <div class="absolute top-12 right-4 z-50">
            <div class="flex flex-col gap-1">
                <label id="uiLangLabel" class="text-[10px] font-medium text-slate-500 text-right block mr-1">介面語言</label>
                <select id="uiLangSelect" onchange="changeUILanguage()" 
                        class="bg-[#1e293b] border border-slate-600 rounded-lg px-2 py-1 text-xs text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                    <option value="zh-TW" selected>繁體中文</option>
                    <option value="zh-CN">简体中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
        </div>

        <header class="text-center mb-16">
            <h1 class="text-6xl font-extrabold text-white mb-6 tracking-tighter">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">YouTube</span> 轉文章
            </h1>
            <p class="text-slate-400 text-xl font-light tracking-wide">高效並行轉換 <span class="mx-2 text-slate-600">|</span> 結構化深度知識庫</p>
        </header>

        <div class="space-y-6 mb-12">
            <!-- 配置區塊 -->
            <div class="bg-[#1e293b]/50 backdrop-blur-sm p-8 rounded-3xl border border-slate-700/50 shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-sm font-semibold text-slate-300">Gemini API Key</label>
                            <span class="text-[10px] text-slate-500 flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                僅儲存於本機瀏覽器
                            </span>
                        </div>
                        <input id="apiKeyInput" type="password" placeholder="輸入你的 Gemini API Key..." 
                               class="w-full bg-[#0f172a] border border-slate-600 focus:border-blue-500 rounded-2xl px-5 py-3 text-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 transition-all placeholder:text-slate-600">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">文章輸出語系</label>
                        <select id="targetLangSelect" 
                                class="w-full bg-[#0f172a] border border-slate-600 focus:border-blue-500 rounded-2xl px-5 py-3 text-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 transition-all cursor-pointer appearance-none">
                            <option value="中文">中文 (預設)</option>
                            <option value="繁體中文">繁體中文</option>
                            <option value="English">English</option>
                            <option value="日本語">日本語</option>
                            <option value="한국어">한국어</option>
                            <option value="Español">Español</option>
                            <option value="Français">Français</option>
                        </select>
                    </div>
                </div>

                <!-- 輸入區塊 -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center ml-1">
                        <div class="flex items-center gap-3">
                            <label class="text-sm font-semibold text-slate-300">YouTube 影片連結</label>
                            <span class="text-[10px] text-slate-500 italic">支援多行、逗號或空格分隔</span>
                        </div>
                        <button onclick="clearInput()" class="text-[10px] text-slate-500 hover:text-red-400 transition-colors flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                            清除輸入
                        </button>
                    </div>
                    <textarea id="urlInput" placeholder="貼上連結... (可同時貼入多個，系統會自動解析)" 
                              class="w-full h-40 bg-[#0f172a] border border-slate-600 focus:border-blue-500 rounded-2xl px-5 py-4 text-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 transition-all resize-none placeholder:text-slate-700 font-mono text-sm"></textarea>
                    
                    <button id="convertBtn" onclick="convert()" 
                            class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 rounded-2xl transition-all active:scale-[0.98] disabled:opacity-50 shadow-xl shadow-blue-900/20 flex items-center justify-center gap-2 group">
                        <svg class="group-hover:rotate-12 transition-transform" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        立即啟動並行轉換 <span class="text-xs font-normal opacity-50 ml-1">(Ctrl+Enter)</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 錯誤訊息顯示區域 -->
        <div id="errorDisplay" class="hidden mb-8 p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm space-y-2">
            <div class="flex items-center gap-2 font-bold mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12" y2="16"></line></svg>
                <span>發生錯誤或部分轉換失敗</span>
            </div>
            <div id="errorMessages" class="space-y-1 opacity-90"></div>
        </div>

        <div id="loading" class="hidden space-y-4 mb-12">
            <div class="flex justify-between items-center mb-2">
                <p id="loadingText" class="text-slate-400 text-lg font-medium">正在初始化並行隊列...</p>
                <span id="progressPercent" class="text-blue-500 font-bold">0%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultContainer" class="hidden space-y-4 mb-12">
            <!-- 結果控制列 -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-[#1e293b] p-3 rounded-2xl border border-slate-700 gap-4">
                <div id="resultTabs" class="flex gap-2 overflow-x-auto pb-1 md:pb-0 w-full md:w-auto scrollbar-hide">
                    <!-- 分頁標籤將由 JS 動態生成 -->
                </div>
                <div class="flex gap-2 w-full md:w-auto shrink-0 border-t md:border-t-0 border-slate-700 pt-3 md:pt-0">
                    <button onclick="downloadMarkdown()" class="flex-1 md:flex-none bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        下載 MD
                    </button>
                    <button onclick="copyMarkdown()" class="flex-1 md:flex-none bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 px-4 py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 border border-blue-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        複製內容
                    </button>
                </div>
            </div>
            
            <div id="result" class="bg-[#1e293b] p-8 md:p-12 rounded-3xl shadow-2xl border border-slate-700 prose max-w-none">
                <!-- 文章內容將在此渲染 -->
            </div>
        </div>

        <div id="historySection" class="mt-20">
            <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                <span>📜 最近轉換紀錄</span>
            </h2>
            <div id="historyList" class="grid gap-4">
                <!-- 歷史紀錄將在此渲染 -->
            </div>
        </div>
    </div>

    <script>
        const i18n = {

                urlPlaceholder: '粘贴链接... (可同时貼入多个，系统会自动解析)',

                clearBtn: '清除输入',
                errorTitle: '发生错误或部分转换失败',
                loadingSteps: ["🔍 初始化并行队列...", "📥 批量提取字幕...", "🧹 并行清洗数据...", "🤖 AI 深度重构文章..."],
                resultMsg: '文章已生成',
                downloadBtn: '下载 MD',
                copyBtn: '复制内容',
                historyTitle: '📜 最近转换记录',

                confirmDelete: '确定要删除这条记录吗？',

                copySuccess: 'Markdown 已复制到剪贴板！',
                requestFail: '请求失败: '
            },
            'en': {
                title: 'YouTube to Article v3.1',
                subtitle: 'High-efficiency Parallel Conversion | Structured Knowledge Base',
                apiLabel: 'Gemini API Key',
                apiHint: 'Stored locally in browser',
                apiPlaceholder: 'Enter your Gemini API Key...',
                uiLangLabel: 'UI Language',
                targetLangLabel: 'Target Article Language',
                urlLabel: 'YouTube Video Links',
                urlHint: 'Supports multiple lines, commas, or spaces',
                urlPlaceholder: 'Paste links... (multiple supported, auto-parsing)',
                convertBtn: 'Start Parallel Conversion',
                clearBtn: 'Clear Input',
                errorTitle: 'Errors occurred or partial failure',
                loadingSteps: ["🔍 Initializing parallel queue...", "📥 Batch extracting subtitles...", "🧹 Parallel data cleaning...", "🤖 AI deep restructuring..."],
                resultMsg: 'Article generated',
                downloadBtn: 'Download MD',
                copyBtn: 'Copy Content',
                historyTitle: '📜 Recent Conversions',
                noHistory: 'No records found',
                confirmDelete: 'Are you sure you want to delete this record?',
                deleteFail: 'Delete failed',
                copySuccess: 'Markdown copied to clipboard!',
                requestFail: 'Request failed: '
            },
            'ja': {
                title: 'YouTube 記事変換ツール v3.1',
                subtitle: '高効率並列変換 | 構造化ナレッジベース',
                apiLabel: 'Gemini API Key',
                apiHint: 'ブラウザにのみ保存されます',
                apiPlaceholder: 'Gemini API Keyを入力してください...',
                uiLangLabel: 'UI言語',
                targetLangLabel: '出力記事の目標言語',
                urlLabel: 'YouTube動画リンク',
                urlHint: '複数行、カンマ、またはスペース区切りに対応',
                urlPlaceholder: 'リンクを貼り付けてください (複数対応、自動解析)',
                convertBtn: '並列変換を開始',
                clearBtn: '入力をクリア',
                errorTitle: 'エラーが発生しました、または一部轉換に失敗しました',
                loadingSteps: ["🔍 並列キューを初期化中...", "📥 字幕を一括抽出中...", "🧹 データを並列クレンジング中...", "🤖 AIが記事を深く再構成中..."],
                resultMsg: '記事が生成されました',
                downloadBtn: 'MD',
                copyBtn: 'コピー',
                historyTitle: '📜 最近の轉換履歴',
                noHistory: '履歴はありません',
                confirmDelete: 'この記録を削除してもよろしいですか？',
                deleteFail: '削除に失敗しました',
                copySuccess: 'Markdownをクリップボードにコピーしました！',
                requestFail: 'リクエストに失敗しました: '
            }
        };

        const uiStrings = {
            clearConfirm: '確定要清除輸入嗎？',
            parseError: '找不到有效的 YouTube 連結',
            successBatch: '批次轉換完成！'
        };

        let currentArticle = "";
        let currentTitle = "";
        let conversionResults = [];

        function clearInput() {
            const input = document.getElementById('urlInput');
            if (input.value && confirm(uiStrings.clearConfirm)) {
                input.value = '';
                input.focus();
            }
        }

        function switchResult(index) {
            const result = conversionResults[index];
            if (!result) return;
            
            showArticle(result.article, result.title);
            
            const tabs = document.querySelectorAll('.result-tab');
            tabs.forEach((tab, i) => {
                if (i === index) {
                    tab.classList.remove('bg-slate-800', 'text-slate-400');
                    tab.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-900/40');
                } else {
                    tab.classList.add('bg-slate-800', 'text-slate-400');
                    tab.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-900/40');
                }
            });
        }

        function renderTabs(results) {
            const container = document.getElementById('resultTabs');
            container.innerHTML = '';
            
            results.forEach((res, i) => {
                const btn = document.createElement('button');
                btn.className = `result-tab flex-shrink-0 px-4 py-2 rounded-xl text-xs font-medium transition-all ${i === 0 ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`;
                const shortTitle = res.title.length > 12 ? res.title.substring(0, 12) + '...' : res.title;
                btn.innerText = `📄 ${shortTitle}`;
                btn.onclick = () => switchResult(i);
                container.appendChild(btn);
            });
        }

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                const btn = document.getElementById('convertBtn');
                if (!btn.disabled) convert();
            }
        });

        function parseUrls(text) {
            const youtubeRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/g;
            const matches = [];
            let match;
            while ((match = youtubeRegex.exec(text)) !== null) {
                matches.push(`https://www.youtube.com/watch?v=${match[1]}`);
            }
            return [...new Set(matches)];
        }

        function changeUILanguage() {
            const lang = document.getElementById('uiLangSelect').value;
            localStorage.setItem('ui_lang', lang);
            const t = i18n[lang];
            
            document.title = t.title;
            const headerH1 = document.querySelector('header h1');
            if (headerH1) {
                headerH1.innerHTML = lang === 'zh-TW' || lang === 'zh-CN' ? 
                    `<span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">YouTube</span> ${lang === 'zh-TW' ? '轉文章' : '转文章'}` : 
                    `<span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">YouTube</span> to Article`;
            }
            document.querySelector('header p').innerText = t.subtitle;
            document.getElementById('apiKeyInput').placeholder = t.apiPlaceholder;
            document.getElementById('uiLangLabel').innerText = t.uiLangLabel;
            
            // 更新 API Key Hint
            const apiHint = document.querySelector('#apiKeyInput').parentElement.querySelector('.text-slate-500');
            if (apiHint) apiHint.innerText = t.apiHint;

            // 更新 文章輸出語系 Label
            const targetLangLabel = document.querySelector('label[class*="text-sm font-semibold text-slate-300"]');
            // 注意：這裡有兩個 label，需要精確定位第二個
            const labels = document.querySelectorAll('label.text-sm.font-semibold.text-slate-300');
            if (labels[1]) labels[1].innerText = t.targetLangLabel;
            
            const urlInput = document.getElementById('urlInput');
            if (urlInput) urlInput.placeholder = t.urlPlaceholder;
            
            // 更新 YouTube 連結 Label 與 Hint
            const urlLabelContainer = document.querySelector('#urlInput').parentElement.querySelector('.flex.items-center.gap-3');
            if (urlLabelContainer) {
                const label = urlLabelContainer.querySelector('label');
                const hint = urlLabelContainer.querySelector('span');
                if (label) label.innerText = t.urlLabel;
                if (hint) hint.innerText = t.urlHint;
            }
            
            const convertBtn = document.getElementById('convertBtn');
            if (convertBtn) convertBtn.innerHTML = `<svg class="group-hover:rotate-12 transition-transform" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg> ${t.convertBtn} <span class="text-xs font-normal opacity-50 ml-1">(Ctrl+Enter)</span>`;
            
            // 更新 清除輸入按鈕
            const clearBtn = document.querySelector('button[onclick="clearInput()"]');
            if (clearBtn) {
                const btnText = clearBtn.querySelector('span') || clearBtn;
                // 如果按鈕內有 span 就改 span，否則直接改 innerHTML (保留 SVG)
                const svg = clearBtn.querySelector('svg').outerHTML;
                clearBtn.innerHTML = `${svg} ${t.clearBtn}`;
            }
            
            const errorSpan = document.querySelector('#errorDisplay .flex.items-center.gap-2.font-bold.mb-1 span');
            if (errorSpan) errorSpan.innerText = t.errorTitle;
            
            const dlBtn = document.querySelector('button[onclick="downloadMarkdown()"]');
            if (dlBtn) dlBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> ${t.downloadBtn}`;
            
            const cpBtn = document.querySelector('button[onclick="copyMarkdown()"]');
            if (cpBtn) cpBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> ${t.copyBtn}`;
            
            const historySpan = document.querySelector('#historySection h2 span');
            if (historySpan) historySpan.innerText = t.historyTitle;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white text-sm transition-all duration-300 transform translate-y-0 z-[100] ${
                type === 'error' ? 'bg-red-600' : 'bg-blue-600'
            }`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showError(messages) {
            const display = document.getElementById('errorDisplay');
            const container = document.getElementById('errorMessages');
            if (!messages || messages.length === 0) {
                display.classList.add('hidden');
                return;
            }
            container.innerHTML = messages.map(m => `<div>• ${m}</div>`).join('');
            display.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorDisplay').classList.add('hidden');
        }

        async function loadHistory() {
            try {
                const res = await fetch('/history');
                const data = await res.json();
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                if (!data || !Array.isArray(data) || data.length === 0) {
                    list.innerHTML = '<p class="text-slate-500 text-center py-8 bg-[#1e293b] rounded-xl border border-slate-700">尚無紀錄</p>';
                    return;
                }
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bg-[#1e293b] p-3 rounded-xl border border-slate-700 flex gap-4 items-center hover:border-blue-500 transition-all cursor-pointer group overflow-hidden';
                    div.onclick = () => showArticle(item.article, item.title);
                    div.innerHTML = `
                        <div class="w-24 h-14 flex-shrink-0 overflow-hidden rounded-lg bg-slate-800 relative">
                                <img src="${item.thumbnail || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" 
                                     referrerpolicy="no-referrer"
                                     class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" 
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                                <div class="absolute inset-0 flex items-center justify-center bg-slate-700 text-[10px] text-slate-400" style="display:none">No Image</div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-white font-medium mb-1 truncate group-hover:text-blue-400 transition-all overflow-hidden whitespace-nowrap text-ellipsis">${item.title}</div>
                            <div class="text-xs text-slate-500 truncate overflow-hidden whitespace-nowrap text-ellipsis">${item.date} · ${item.url}</div>
                        </div>
                        <div class="flex-shrink-0 ml-2">
                            <button onclick="event.stopPropagation(); deleteItem('${item.url}')" class="p-2 hover:bg-red-500/20 rounded-lg text-slate-500 hover:text-red-400 transition-all" title="刪除">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                console.error('Load history failed:', e);
            }
        }

        function showArticle(article, title) {
            currentArticle = article;
            currentTitle = title;
            document.getElementById('result').innerHTML = marked.parse(article);
            document.getElementById('resultContainer').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteItem(url) {
            if(!confirm('確定要刪除這條紀錄嗎？')) return;
            try {
                await fetch(`/history?url=${encodeURIComponent(url)}`, { method: 'DELETE' });
                await loadHistory();
            } catch (e) {
                showError(['刪除失敗']);
            }
        }

        async function copyMarkdown() {
            if(!currentArticle) return;
            await navigator.clipboard.writeText(currentArticle);
            const lang = document.getElementById('uiLangSelect').value;
            showToast(i18n[lang].copySuccess);
        }

        function downloadMarkdown() {
            if(!currentArticle || !currentTitle) return;
            const blob = new Blob([currentArticle], { type: 'text/markdown; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const safeName = currentTitle.replace(/[/\\?%*:|"<>]/g, '-').trim();
            a.href = url;
            a.download = safeName + '.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function convert() {
            const urlInput = document.getElementById('urlInput');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const targetLangSelect = document.getElementById('targetLangSelect');
            
            const validUrls = parseUrls(urlInput.value);
            const apiKey = apiKeyInput.value.trim();
            const targetLang = targetLangSelect.value;
            
            const lang = document.getElementById('uiLangSelect').value;
            const t = i18n[lang];

            hideError();
            if (!apiKey) {
                showError([t.apiPlaceholder]);
                return;
            }
            
            if (validUrls.length === 0) {
                showError([uiStrings.parseError]);
                return;
            }

            localStorage.setItem('gemini_api_key', apiKey);
            
            const btn = document.getElementById('convertBtn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const loadingText = document.getElementById('loadingText');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            
            btn.disabled = true;
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            
            let progress = 0;
            const steps = t.loadingSteps;
            let stepIdx = 0;
            
            const progressInterval = setInterval(() => {
                if (progress < 30) progress += Math.random() * 5;
                else if (progress < 70) progress += Math.random() * 2;
                else if (progress < 95) progress += Math.random() * 0.5;
                if (progress > 100) progress = 100;
                progressBar.style.width = `${progress}%`;
                progressPercent.innerText = `${Math.round(progress)}%`;
                
                if (progress > 25 && stepIdx === 0) stepIdx = 1;
                if (progress > 50 && stepIdx === 1) stepIdx = 2;
                if (progress > 80 && stepIdx === 2) stepIdx = 3;
                loadingText.innerText = steps[stepIdx];
            }, 200);

            try {
                const formData = new FormData();
                formData.append('urls', validUrls.join('\n'));
                formData.append('api_key', apiKey);
                formData.append('target_lang', targetLang);
                
                const response = await fetch('/convert', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.error) {
                    showError([data.error]);
                } else {
                    progress = 100;
                    progressBar.style.width = '100%';
                    progressPercent.innerText = '100%';
                    
                    setTimeout(async () => {
                        const results = data.results;
                        const successful = results.filter(r => !r.error);
                        const failed = results.filter(r => r.error);
                        
                        if (successful.length === 0) {
                            const errorMsgs = failed.map(f => `${f.url} : ${f.error}`);
                            showError(errorMsgs);
                        } else {
                            conversionResults = successful;
                            renderTabs(successful);
                            
                            const firstResult = successful[0];
                            currentArticle = firstResult.article;
                            const titleMatch = currentArticle.match(/^#\s+(.*)$/m);
                            currentTitle = titleMatch ? titleMatch[1] : (firstResult.title || "YouTube 轉文章");
                            showArticle(currentArticle, currentTitle);
                            
                            if (failed.length > 0) {
                                const errorMsgs = failed.map(f => `${f.url} : ${f.error}`);
                                showError(errorMsgs);
                            }
                            showToast(uiStrings.successBatch);
                        }
                        await loadHistory();
                    }, 500);
                }
            } catch (e) {
                showError([t.requestFail + e]);
            } finally {
                clearInterval(progressInterval);
                setTimeout(() => {
                    loading.classList.add('hidden');
                    progressBar.style.width = '0%';
                    progressPercent.innerText = '0%';
                }, 800);
                btn.disabled = false;
            }
        }

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
            const savedLang = localStorage.getItem('ui_lang');
            if (savedLang) {
                document.getElementById('uiLangSelect').value = savedLang;
                changeUILanguage();
            }
            loadHistory();
        };
    </script>
</body>
</html>
